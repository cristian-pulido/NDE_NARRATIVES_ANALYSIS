[dataset]
id_column = "response_id"
stratify_column = "valence"
missing_label = "Missing"
quality_label_column = "m11_quality_label"
quality_values_to_use = ["Complete structured"]
to_drop_column = "TO_DROP"
to_drop_exclude_value = true
require_all_texts = true
drop_missing_strata = true

[sampling]
n_total = 3
random_state = 11
aux_prefix = "ANN"
aux_id_digits = 4
hash_salt = "nde_annotation_2026"

[workflow]
section_order = ["context", "experience", "aftereffects"]

[outputs]
annotator_filename = "nde_annotation_sample.xlsx"
mapping_filename = "nde_annotation_mapping_private.xlsx"
column_map_filename = "nde_annotation_column_mapping_private.xlsx"

[labels]
tone = ["positive", "negative", "mixed", "neutral"]
binary = ["yes", "no"]

[sections.context]
source_column = "nde_context"
text_label = "Context Narrative"
tone_internal_column = "context_tone"
tone_visible_label = "Context Tone"

[sections.context.binary_labels]

[sections.experience]
source_column = "nde_description"
text_label = "Experience Narrative"
tone_internal_column = "experience_tone"
tone_visible_label = "Experience Tone"

[sections.experience.binary_labels]
outside_of_body_experience = "Out-of-body sensation"
feeling_bright_light = "Bright light"
feeling_awareness = "Heightened awareness"
presence_encounter = "Encounter with a presence"
saw_relived_past_events = "Relived past events"
time_perception_altered = "Altered time perception"
border_point_of_no_return = "Border or point of no return"
non_existence_feeling = "Feeling of non-existence"
feeling_peace_wellbeing = "Peace or wellbeing"
saw_entered_gateway = "Entered a gateway"

[sections.aftereffects]
source_column = "nde_aftereffects"
text_label = "Aftereffects Narrative"
tone_internal_column = "aftereffects_tone"
tone_visible_label = "Aftereffects Tone"

[sections.aftereffects.binary_labels]
fear_of_death = "Fear of death"
inner_meaning_in_my_life = "Inner meaning in my life"
compassion_toward_others = "Compassion toward others"
spiritual_feelings = "Spiritual feelings"
desire_to_help_others = "Desire to help others"
personal_vulnerability = "Personal vulnerability"
interest_in_material_goods = "Interest in material goods"
interest_in_religion = "Interest in religion"
understanding_myself = "Understanding myself"
social_justice_issues = "Social justice issues"

[questionnaire.nde_c]
yes_values = ["Medium", "Intensively", "Extremely"]
no_values = ["Not at all - absence", "Slightly"]

[questionnaire.nde_c.columns]
outside_of_body_experience = "outside_of_body_experience"
feeling_bright_light = "feeling_bright_light"
feeling_awareness = "feeling_awareness"
presence_encounter = "presence_encounter"
saw_relived_past_events = "saw_relived_past_events"
time_perception_altered = "time_perception_altered"
border_point_of_no_return = "border_point_of_no_return"
non_existence_feeling = "non_existence_feeling"
feeling_peace_wellbeing = "feeling_peace_wellbeing"
saw_entered_gateway = "saw_entered_gateway"

[questionnaire.lci_r]
yes_values = ["Increased", "Strongly increased", "Decreased", "Strongly diminished"]
no_values = ["Not changed"]
na_values = ["Missing"]

[questionnaire.lci_r.columns]
fear_of_death = "fear_of_death"
inner_meaning_in_my_life = "inner_meaning_in_my_life"
compassion_toward_others = "compassion_toward_others"
spiritual_feelings = "spiritual_feelings"
desire_to_help_others = "desire_to_help_others"
personal_vulnerability = "personal_vulnerability"
interest_in_material_goods = "interest_in_material_goods"
interest_in_religion = "interest_in_religion"
understanding_myself = "understanding_myself"
social_justice_issues = "social_justice_issues"
