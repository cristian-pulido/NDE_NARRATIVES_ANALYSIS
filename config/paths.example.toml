[paths]
data_dir = "D:/data/nde"
survey_csv = "D:/data/nde/results-survey.csv"

# Optional overrides. If omitted, they are resolved relative to data_dir.
# annotation_output_dir = "D:/data/nde/annotation_outputs"
# human_annotations_dir = "D:/data/nde/human_annotations"
# llm_batch_dir = "D:/data/nde/llm_batches"
# llm_results_dir = "D:/data/nde/llm_outputs"
# evaluation_output_dir = "D:/data/nde/evaluation_outputs"
# preprocessing_output_dir = "D:/data/nde/preprocessing_outputs"
# prompt_variants_dir = "D:/data/nde/prompt_variants"
# sampled_private_workbook = "D:/data/nde/annotation_outputs/nde_annotation_mapping_private.xlsx"
# human_annotation_workbook = "D:/data/nde/human_annotations/nde_annotation_sample_completed.xlsx"
# llm_predictions_path = "D:/data/nde/llm_outputs/nde_predictions.jsonl"

[llm]
provider = "ollama"
base_url = "http://localhost:11434"
timeout_seconds = 120
max_attempts = 2
temperature = 0.0

[preprocessing]
provider = "ollama"
base_url = "http://localhost:11434"
timeout_seconds = 120
max_attempts = 2
temperature = 0.0
model = "qwen2.5:7b"
prompt_version = "v1"

[[llm.experiments]]
experiment_id = "qwen25_baseline"
enabled = true
model = "qwen2.5:7b"
prompt_variant = "baseline"
run_id = "run-01"
model_variant = "qwen2.5:7b"
temperature = 0.0
